name: Build Android APK
on:
  push:
    branches: [ "main" ]  # Workflow akan berjalan saat ada push ke branch 'main'

jobs:
  build:
    runs-on: ubuntu-latest # Menggunakan server Ubuntu
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Langkah 1: Mengambil kode dari repository

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Langkah 2: Menyiapkan Java
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug # Langkah 3: Menjalankan perintah build

      - name: Upload APK
        uses: actions/upload-artifact@v4 # Langkah 4: Menyimpan file APK yang sudah jadi
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
